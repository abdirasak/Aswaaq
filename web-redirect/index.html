<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aswaaq — Open App to Reset Password</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 24px; color: #0f172a; }
      .card { max-width: 560px; margin: 0 auto; border: 1px solid #e5e7eb; border-radius: 16px; padding: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
      h1 { font-size: 20px; margin: 0 0 12px; color: #064229; }
      p { margin: 8px 0; color: #334155; }
      .btn { display: inline-block; padding: 12px 16px; border-radius: 10px; background: #064229; color: #fff; font-weight: 700; text-decoration: none; }
      .muted { color: #64748b; font-size: 14px; }
      code { background: #f1f5f9; padding: 2px 6px; border-radius: 6px; }
    </style>
    <script>
      (function () {
        function getParam(name) {
          const params = new URLSearchParams(window.location.search);
          const value = params.get(name);
          return value == null ? '' : value;
        }

        function buildAppLink() {
          const userId = getParam('userId');
          const secret = getParam('secret');
          const appUrl = getParam('appUrl');
          
          let baseLink = '';
          if (appUrl) {
            // If we have appUrl (e.g. exp://...), use it as the base
            baseLink = appUrl;
          } else {
            // Fallback for production/dev builds
            baseLink = 'aswaaq-app://reset-password';
          }
          
          const qp = new URLSearchParams({ userId, secret });
          // Ensure we handle existing query params in appUrl if any
          const separator = baseLink.includes('?') ? '&' : '?';
          return `${baseLink}${separator}${qp.toString()}`;
        }

        function openApp() {
          const appLink = buildAppLink();
          var manual = document.getElementById('manual');
          if (manual) manual.href = appLink;

          try {
            window.location.replace(appLink);
          } catch (e) {}

          setTimeout(function () {
            var status = document.getElementById('status');
            if (status) {
              status.textContent = 'If the app did not open automatically, tap the button below.';
            }
          }, 1500);
        }

        window.addEventListener('DOMContentLoaded', openApp);
      })();
    </script>
  </head>
  <body>
    <div class="card">
      <h1>Open Aswaaq to Reset Your Password</h1>
      <p id="status">Attempting to open the Aswaaq app…</p>
      <p>
        <a id="manual" class="btn" href="#">Open in App</a>
      </p>
      <p class="muted">
        If nothing happens, make sure the Aswaaq app is installed. You can return to this page from your email at any time.
      </p>
    </div>
  </body>
</html>
